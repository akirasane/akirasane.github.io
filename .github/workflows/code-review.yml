name: AI Code Review

on:
  workflow_dispatch: # Manual trigger only (AI code review disabled on PRs)

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-review:
    name: Gemini AI Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run AI review
        env:
          LOCAL_AI_API_KEY: ${{ secrets.LOCAL_AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/ai-review.js
